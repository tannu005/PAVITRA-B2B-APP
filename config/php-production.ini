[PHP]
; Memory and execution limits
memory_limit = 512M
max_execution_time = 30
max_input_time = 30
post_max_size = 32M
upload_max_filesize = 32M
default_socket_timeout = 5
; Error reporting (Disable display on production)
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php-fpm/pavitra-error.log
; Keep-Alive and output buffering
output_buffering = 4096
zlib.output_compression = Off
implicit_flush = Off
[opcache]
; Enable OPcache bytecode caching
opcache.enable = 1
opcache.enable_cli = 1
; Memory dedicated to pre-compiled bytecode (adjust based on RAM)
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
; Maximum number of files in the cache (Pavitra has ~200 PHP files, 20K is highly future-proof)
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
; Fast shutdown helper
opcache.fast_shutdown = 1
[JIT]
; PHP 8.3 JIT (Just-In-Time) compiler configurations
opcache.jit = tracing
opcache.jit_buffer_size = 64M
[MySQLi]
; Keep MySQL connections alive and fast
mysqli.allow_persistent = On
mysqli.max_persistent = -1
mysqli.max_links = -1
mysqli.default_port = 3306
mysqli.reconnect = Off
[PDO]
pdo_mysql.default_socket =
